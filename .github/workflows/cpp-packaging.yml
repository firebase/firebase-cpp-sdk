name: Modern Firebase C++ 1-Step CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apple:
    name: Build Apple Frameworks (iOS / macOS)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        preset: [ios-sim-universal, ios-arm64, macos-arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Modern CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"

      - name: Execute 1-Step Full SDK Build & XCFramework Assembly
        run: ./scripts/gha/build.py --preset ${{ matrix.preset }}

  build-android:
    name: Build Android NDK Archives
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Modern CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"

      - name: Execute 1-Step Android arm64 Build
        run: ./scripts/gha/build.py --preset android-arm64

  build-desktop:
    name: Build Desktop Archives (Linux / Windows)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            preset: linux-x64
          - os: windows-latest
            preset: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Modern CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"

      - name: Execute 1-Step Desktop Build
        run: python scripts/gha/build.py --preset ${{ matrix.preset }}
